<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Planet Picker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <div class="info">
    <h2 id="planetName">Mars</h2>
    <div class="stats">
      <div class="stat"><span id="statTilt">25.2°</span><label>tilt</label></div>
      <div class="stat"><span id="statGravity">0.38x</span><label>gravity</label></div>
      <div class="stat"><span id="statMoons">2</span><label>moons</label></div>
    </div>
  </div>

  <div class="dial">
    <div class="tick"></div>
    <div class="planet-box">
      <img id="planet" src="">
      <div class="light"></div>
    </div>
    <svg id="orbit" viewBox="0 0 440 440">
      <circle class="orbit-ring" cx="220" cy="220" r="195" fill="none"/>
      <g id="arcLabels"></g>
    </svg>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
